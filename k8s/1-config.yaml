apiVersion: v1
kind: Namespace
metadata:
  name: ecommerce
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ecommerce-config
  namespace: ecommerce
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  MONGO_AUTH_SOURCE: "admin"
  PORT: "3000"
---
apiVersion: v1
kind: Secret
metadata:
  name: ecommerce-secrets
  namespace: ecommerce
type: Opaque
stringData:
  # In a real production setup, these would be managed by ExternalSecrets/Vault
  MONGO_ROOT_USERNAME: "k8s_admin"
  MONGO_ROOT_PASSWORD: "k8s_super_secret_password"
  JWT_SECRET: "k8s_production_jwt_secret_key_change_me"
