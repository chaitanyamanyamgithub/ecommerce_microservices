apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: ecommerce-slo-alerts
  namespace: observability
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: multi-window-burn-rate
      rules:
        - alert: SLOFastBurn1h
          expr: |
            (
              rate(ecommerce_http_requests_total{status_code=~"5.."}[1h])
              /
              rate(ecommerce_http_requests_total[1h])
            ) > (14.6 * 0.001)
            and
            (
              rate(ecommerce_http_requests_total{status_code=~"5.."}[5m])
              /
              rate(ecommerce_http_requests_total[5m])
            ) > (14.6 * 0.001)
          labels:
            severity: critical
            service: "{{ $labels.service }}"
          annotations:
            summary: "Critical SLO Fast Burn on {{ $labels.service }}"
            description: "Service is burning its error budget too fast. 2% budget burned in 1 hour."
            runbook_url: "https://wiki.ecommerce.local/runbooks/slo-fast-burn"

        - alert: SLOSlowBurn6h
          expr: |
            (
              rate(ecommerce_http_requests_total{status_code=~"5.."}[6h])
              /
              rate(ecommerce_http_requests_total[6h])
            ) > (6 * 0.001)
            and
            (
              rate(ecommerce_http_requests_total{status_code=~"5.."}[30m])
              /
              rate(ecommerce_http_requests_total[30m])
            ) > (6 * 0.001)
          labels:
            severity: warning
            service: "{{ $labels.service }}"
          annotations:
            summary: "Warning: SLO Slow Burn on {{ $labels.service }}"
            description: "Service is burning its error budget steadily. 5% budget burned in 6 hours."
            runbook_url: "https://wiki.ecommerce.local/runbooks/slo-slow-burn"

        - alert: SLOUltraSlowBurn3d
          expr: |
            (
              rate(ecommerce_http_requests_total{status_code=~"5.."}[3d])
              /
              rate(ecommerce_http_requests_total[3d])
            ) > (1 * 0.001)
            and
            (
              rate(ecommerce_http_requests_total{status_code=~"5.."}[6h])
              /
              rate(ecommerce_http_requests_total[6h])
            ) > (1 * 0.001)
          labels:
            severity: info
            service: "{{ $labels.service }}"
          annotations:
            summary: "Info: SLO Ultra-Slow Burn on {{ $labels.service }}"
            description: "Service has consumed 10% of its error budget over the last 3 days."
