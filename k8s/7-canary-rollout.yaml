# ── Argo Rollout Canary Example ────────────────────────────────
# To use this advanced deployment strategy, install the Argo Rollouts controller:
# kubectl create namespace argo-rollouts
# kubectl apply -n argo-rollouts -f https://github.com/argoproj/argo-rollouts/releases/latest/download/install.yaml
#
# Then, replace the standard Deployment in k8s/services/user-service.yaml with this Rollout.

apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: user-service
  namespace: ecommerce
spec:
  replicas: 5
  strategy:
    canary:
      # Expose the canary to traffic gradually
      steps:
        - setWeight: 5         # 1. Start by routing 5% of traffic to the new version
        - pause: {duration: 1m} # 2. Wait 1 minute to observe logs/metrics
        - setWeight: 20        # 3. Increase to 20%
        # 4. Integrate with Prometheus to automatically promote or rollback
        #    based on Error Rate and Latency SLOs:
        - analysis:
            templates:
              - templateName: success-rate-slo
        - setWeight: 50
        - pause: {duration: 2m}
        - setWeight: 100
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: ecommerce-user-service:latest
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: ecommerce-config
            - secretRef:
                name: ecommerce-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
---
# ── Analysis Template (SLO Gate) ──────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: success-rate-slo
  namespace: ecommerce
spec:
  args:
    - name: service-name
      value: user-service
  metrics:
    - name: success-rate
      interval: 10s
      successCondition: result[0] >= 0.99  # Require 99% success rate
      failureLimit: 3                      # Rollback immediately on 3 failures
      provider:
        prometheus:
          address: http://kube-prometheus-stack-prometheus.observability.svc.cluster.local:9090
          query: |
            sum(rate(http_requests_total{service="{{args.service-name}}", status=~"2..|3.."}[1m])) 
            / 
            sum(rate(http_requests_total{service="{{args.service-name}}"}[1m]))
