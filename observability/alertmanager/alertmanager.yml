global:
  resolve_timeout: 5m

route:
  receiver: default
  group_by: ['alertname', 'service', 'severity']
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 2h

receivers:
  - name: default
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK_URL_HERE'
        channel: '#ecommerce-alerts'
        send_resolved: true
        title: '[{{ .Status | toUpper }}] Alert: {{ .GroupLabels.alertname }} ({{ .GroupLabels.severity }})'
        text: >-
          {{ range .Alerts }}
            *Service:* {{ .Labels.service }}
            *Summary:* {{ .Annotations.summary }}
            *Description:* {{ .Annotations.description }}
          {{ end }}
    webhook_configs:
      - url: 'http://ecommerce-webhook-receiver:5000/alerts'
        send_resolved: true
