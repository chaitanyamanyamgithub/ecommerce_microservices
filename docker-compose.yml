

services:
  # ── MongoDB Database ──────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: ecommerce-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── User Service ──────────────────────────────────────────
  user-service:
    build:
      context: .
      dockerfile: ./services/user-service/Dockerfile
    container_name: ecommerce-user-service
    restart: unless-stopped
    ports:
      - "3011:3001"
    environment:
      PORT: 3001
      NODE_ENV: ${NODE_ENV}
      MONGO_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongodb:27017/ecommerce_users?authSource=${MONGO_AUTH_SOURCE}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      LOG_LEVEL: ${LOG_LEVEL}
      OTEL_SERVICE_NAME: user-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - ecommerce-network

  # ── Product Service ───────────────────────────────────────
  product-service:
    build:
      context: .
      dockerfile: ./services/product-service/Dockerfile
    container_name: ecommerce-product-service
    restart: unless-stopped
    ports:
      - "3012:3002"
    environment:
      PORT: 3002
      NODE_ENV: ${NODE_ENV}
      MONGO_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongodb:27017/ecommerce_products?authSource=${MONGO_AUTH_SOURCE}
      LOG_LEVEL: ${LOG_LEVEL}
      REDIS_URL: redis://redis:6379
      OTEL_SERVICE_NAME: product-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - ecommerce-network

  # ── Cart Service ──────────────────────────────────────────
  cart-service:
    build:
      context: .
      dockerfile: ./services/cart-service/Dockerfile
    container_name: ecommerce-cart-service
    restart: unless-stopped
    ports:
      - "3013:3003"
    environment:
      PORT: 3003
      NODE_ENV: ${NODE_ENV}
      MONGO_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongodb:27017/ecommerce_carts?authSource=${MONGO_AUTH_SOURCE}
      JWT_SECRET: ${JWT_SECRET}
      LOG_LEVEL: ${LOG_LEVEL}
      OTEL_SERVICE_NAME: cart-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - ecommerce-network

  # ── Order Service ─────────────────────────────────────────
  order-service:
    build:
      context: .
      dockerfile: ./services/order-service/Dockerfile
    container_name: ecommerce-order-service
    restart: unless-stopped
    ports:
      - "3004:3004"
    environment:
      PORT: 3004
      NODE_ENV: ${NODE_ENV}
      MONGO_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongodb:27017/ecommerce_orders?authSource=${MONGO_AUTH_SOURCE}
      JWT_SECRET: ${JWT_SECRET}
      PRODUCT_SERVICE_URL: http://product-service:3002
      CART_SERVICE_URL: http://cart-service:3003
      PAYMENT_SERVICE_URL: http://payment-service:3005
      LOG_LEVEL: ${LOG_LEVEL}
      OTEL_SERVICE_NAME: order-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - ecommerce-network

  # ── Payment Service ───────────────────────────────────────
  payment-service:
    build:
      context: .
      dockerfile: ./services/payment-service/Dockerfile
    container_name: ecommerce-payment-service
    restart: unless-stopped
    ports:
      - "3005:3005"
    environment:
      PORT: 3005
      NODE_ENV: ${NODE_ENV}
      MONGO_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongodb:27017/ecommerce_payments?authSource=${MONGO_AUTH_SOURCE}
      JWT_SECRET: ${JWT_SECRET}
      PAYMENT_GATEWAY_KEY: ${PAYMENT_GATEWAY_KEY}
      PAYMENT_GATEWAY_SECRET: ${PAYMENT_GATEWAY_SECRET}
      LOG_LEVEL: ${LOG_LEVEL}
      OTEL_SERVICE_NAME: payment-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - ecommerce-network

  # ── Redis (Caching Layer) ────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: ecommerce-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network

  # ── API Gateway (Nginx) ────────────────────────────────────
  api-gateway:
    image: nginx:1.25-alpine
    container_name: ecommerce-api-gateway
    restart: unless-stopped
    ports:
      - "80:8080"
      - "8000:8080"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - user-service
      - product-service
      - cart-service
      - order-service
      - payment-service
    networks:
      - ecommerce-network
  k6-load:
    image: grafana/k6:0.49.0
    profiles:
      - loadtest
    working_dir: /scripts
    environment:
      BASE_URL: http://api-gateway:8080
    volumes:
      - ./load-tests/k6:/scripts:ro
    command: ["run", "/scripts/flash-sale-product-browse.js"]
    depends_on:
      - api-gateway
    networks:
      - ecommerce-network

  # ── OpenTelemetry Collector ─────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector:latest
    container_name: ecommerce-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    depends_on:
      - jaeger
    networks:
      - ecommerce-network

  # ── Prometheus (Metrics) ──────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: ecommerce-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - otel-collector
      - alertmanager
    networks:
      - ecommerce-network

  # Alertmanager (Alert Routing)
  alertmanager:
    image: prom/alertmanager:latest
    container_name: ecommerce-alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    networks:
      - ecommerce-network

  # ── Loki (Logs Backend) ────────────────────────────────────
  loki:
    image: grafana/loki:3.6.0
    container_name: ecommerce-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - ecommerce-network

  # ── Promtail (Log Collector) ───────────────────────────────
  promtail:
    image: grafana/promtail:3.6.0
    container_name: ecommerce-promtail
    restart: unless-stopped
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./observability/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - ecommerce-network

  # ── Grafana (Dashboards UI) ──────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: ecommerce-grafana
    restart: unless-stopped
    ports:
      - "3010:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/ecommerce-observability.json
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - loki
      - prometheus
    networks:
      - ecommerce-network

  # ── Jaeger (Tracing UI) ────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: ecommerce-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"
    user: root
    environment:
      SPAN_STORAGE_TYPE: badger
      BADGER_EPHEMERAL: "false"
      BADGER_DIRECTORY_VALUE: /badger/data
      BADGER_DIRECTORY_KEY: /badger/key
    volumes:
      - jaeger-data:/badger
    networks:
      - ecommerce-network

# ── Volumes ───────────────────────────────────────────────────
volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  grafana-data:
    driver: local
  prometheus-data:
    driver: local
  alertmanager-data:
    driver: local
  loki-data:
    driver: local
  jaeger-data:
    driver: local
  redis-data:
    driver: local

# ── Networks ──────────────────────────────────────────────────
networks:
  ecommerce-network:
    driver: bridge
    name: ecommerce-network
