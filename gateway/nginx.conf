# ── Rate Limiting Zones ──────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
limit_req_status 429;

# ── Generate Correlation ID ──────────────────────────────────
# If the client sends X-Request-ID, use it; otherwise generate one.
map $http_x_request_id $request_id_value {
    default   $http_x_request_id;
    ""        $request_id;
}

# ── Access Logging ───────────────────────────────────────────
log_format json_log escape=json
    '{"time":"$time_iso8601",'
    '"request_id":"$request_id_value",'
    '"remote_addr":"$remote_addr",'
    '"method":"$request_method",'
    '"uri":"$request_uri",'
    '"status":$status,'
    '"bytes_sent":$bytes_sent,'
    '"upstream_response_time":"$upstream_response_time",'
    '"request_time":$request_time}';

server {
    listen 8080;
    server_name localhost;

    resolver 127.0.0.11 valid=10s ipv6=off;

    set $user_service http://user-service:3001;
    set $product_service http://product-service:3002;
    set $cart_service http://cart-service:3003;
    set $order_service http://order-service:3004;
    set $payment_service http://payment-service:3005;

    access_log /var/log/nginx/access.log json_log;

    # ── Proxy Settings ───────────────────────────────────────────
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $request_id_value;
    proxy_connect_timeout 10s;
    proxy_read_timeout 30s;

    # ── Health Check ─────────────────────────────────────────────
    location /health {
        return 200 '{"status":"gateway healthy"}';
        add_header Content-Type application/json;
    }

    # ── User Service ─────────────────────────────────────────────
    location /api/signup {
        limit_req zone=auth_limit burst=5 nodelay;
        proxy_pass $user_service;
    }

    location /api/login {
        limit_req zone=auth_limit burst=5 nodelay;
        proxy_pass $user_service;
    }

    location /api/users {
        proxy_pass $user_service;
    }

    # ── Product Service ──────────────────────────────────────────
    location /api/products {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass $product_service;
    }

    # ── Cart Service ─────────────────────────────────────────────
    location /api/cart {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass $cart_service;
    }

    # ── Order Service ────────────────────────────────────────────
    location /api/orders {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass $order_service;
    }

    # ── Payment Service ──────────────────────────────────────────
    location /api/payment {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass $payment_service;
    }
}
